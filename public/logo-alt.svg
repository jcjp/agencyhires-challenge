<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Waveform mark - represents channel signals/analytics -->
  <g transform="translate(4, 14)">
    <!-- Bold stroke waveform -->
    <path d="M0 10 L8 10 L12 2 L16 18 L20 6 L24 14 L28 10 L32 10 L36 4 L40 10"
          stroke="url(#wave)"
          stroke-width="4"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>

  <defs>
    <linearGradient id="wave" x1="0" y1="10" x2="40" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="0.5" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
</svg>
